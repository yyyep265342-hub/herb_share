<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>烹饪互助广场 · 霍格沃茨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #100800;
  --bg2:       #1a0f08;
  --bg3:       #201408;
  --border:    #3d1f0a;
  --border2:   #5a2e10;
  --orange:    #e07030;
  --orange-dim:#b84a10;
  --orange-glow:#f0a050;
  --text:      #f5ead8;
  --text-dim:  #7a4a20;
  --gold:      #e8a050;
  --radius:    16px;
  --card-bg:   linear-gradient(160deg, #1a1008 0%, #201408 100%);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Noto Serif SC', serif; min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(180,80,20,.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(120,60,20,.08) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 60% 40%, rgba(220,120,40,.05) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 16px 80px; }

header {
  text-align: center; padding: 56px 20px 36px;
  border-bottom: 1px solid var(--border); margin-bottom: 28px; position: relative;
}
header::after {
  content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
}
.header-icon { font-size: 56px; display: block; margin-bottom: 14px; filter: drop-shadow(0 0 18px rgba(220,120,40,.6)); animation: float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
h1 { font-family: 'Cinzel', serif; font-size: clamp(22px, 5vw, 34px); color: var(--orange-glow); letter-spacing: 6px; text-shadow: 0 0 30px rgba(220,120,40,.4); margin-bottom: 8px; }
.header-sub { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; }

.action-bar {
  position: sticky; top: 0; background: rgba(16,8,0,.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 14px 16px 0; margin: 0 -16px 24px; z-index: 100;
}
.search-row { display: flex; gap: 10px; margin-bottom: 12px; }
.search-box { flex: 1; display: flex; align-items: center; background: var(--bg3); border: 1px solid var(--border2); border-radius: 40px; padding: 0 16px; height: 42px; gap: 8px; }
.search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 14px; }
.search-box input::placeholder { color: var(--text-dim); }
.clear-btn { color: var(--text-dim); cursor: pointer; font-size: 13px; }
.publish-btn { background: linear-gradient(135deg, var(--orange-dim), var(--orange)); color: #fff; border: none; border-radius: 40px; padding: 0 22px; height: 42px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'Noto Serif SC', serif; box-shadow: 0 4px 16px rgba(180,80,20,.35); transition: transform .15s; }
.publish-btn:hover { transform: translateY(-1px); }

.filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-tag { white-space: nowrap; padding: 6px 18px; border-radius: 24px; font-size: 13px; color: var(--text-dim); background: var(--bg3); border: 1px solid var(--border); cursor: pointer; transition: all .15s; font-family: 'Noto Serif SC', serif; }
.filter-tag.active { background: var(--orange-dim); color: #fde8c8; border-color: var(--orange); font-weight: 600; }

.stats-bar { display: flex; gap: 16px; margin-bottom: 20px; font-size: 13px; color: var(--text-dim); }
.stats-bar span { color: var(--orange-glow); font-weight: 600; }

.identity-bar { background: rgba(26,15,8,.8); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-dim); }
.identity-bar .id-val { color: var(--orange-glow); font-weight: 600; }
.identity-bar .change-id { margin-left: auto; cursor: pointer; color: var(--text-dim); text-decoration: underline; font-size: 12px; }

.post-list { display: flex; flex-direction: column; gap: 16px; }
.empty-state { text-align: center; padding: 80px 0; color: var(--text-dim); }
.empty-state .ei { font-size: 60px; opacity: .35; display: block; margin-bottom: 16px; }

.post-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px; position: relative; overflow: hidden; cursor: pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.post-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,100,30,.4), transparent); }
.post-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }

/* 稀有度色带 */
.post-card.rarity-common { border-left: 3px solid #7a7a7a; }
.post-card.rarity-rare   { border-left: 3px solid #5090d0; }
.post-card.rarity-epic   { border-left: 3px solid #9060d0; }
.post-card.rarity-legend { border-left: 3px solid var(--gold); }

.rarity-badge { position: absolute; top: 16px; right: 16px; font-size: 11px; padding: 3px 12px; border-radius: 16px; font-weight: 600; }
.rarity-badge.common { background: #2a2a2a; color: #c0c0c0; border: 1px solid #5a5a5a; }
.rarity-badge.rare   { background: #101a3a; color: #70a8f0; border: 1px solid #2a4888; }
.rarity-badge.epic   { background: #1e1040; color: #b080f0; border: 1px solid #5030a0; }
.rarity-badge.legend { background: #3a2808; color: #f0c060; border: 1px solid #886018; }

.card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; padding-right: 80px; }
.dish-avatar { width: 52px; height: 52px; border-radius: 50%; background: #2a1808; border: 1px solid #6a3010; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.card-meta { flex: 1; }
.dish-name { font-size: 18px; font-weight: 600; color: #f0c090; display: block; margin-bottom: 3px; }
.player-id { font-size: 12px; color: var(--text-dim); }
.qty-badge { font-size: 16px; font-weight: 700; color: var(--orange-glow); background: #2a1808; border: 1px solid #7a4010; border-radius: 8px; padding: 3px 12px; }

.card-note { margin-bottom: 12px; padding: 8px 12px; background: #1e1208; border-left: 2px solid var(--border2); border-radius: 0 8px 8px 0; font-size: 12px; color: #9a6040; line-height: 1.6; }
.card-times { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; font-size: 12px; }
.time-row { display: flex; justify-content: space-between; align-items: center; }
.time-label { color: var(--text-dim); }
.time-val { color: #d8a870; font-weight: 500; }
.time-val.soon { color: #f08040; }
.progress-bar { height: 4px; background: #2a1808; border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange-dim), var(--orange-glow)); border-radius: 4px; transition: width .3s; }
.card-footer { display: flex; justify-content: space-between; align-items: center; }
.status-badge { font-size: 12px; padding: 3px 12px; border-radius: 16px; }
.status-badge.cooking  { background: #101a3a; color: #70a8f0; }
.status-badge.ready    { background: #1a2a10; color: #70c860; }
.status-badge.expiring { background: #3a1808; color: #f08040; }
.countdown { font-size: 12px; color: var(--text-dim); font-family: monospace; }
.delete-btn { position: absolute; bottom: 16px; right: 16px; background: rgba(200,50,50,.15); border: 1px solid rgba(200,50,50,.3); color: #d87070; border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Noto Serif SC', serif; transition: background .15s; }
.delete-btn:hover { background: rgba(200,50,50,.3); }

.modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 1000; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-mask.open { display: flex; }
.modal-box { width: 100%; max-width: 780px; max-height: 92vh; background: #160e08; border-radius: 24px 24px 0 0; border-top: 2px solid var(--border2); display: flex; flex-direction: column; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 20px; font-weight: 600; color: var(--orange-glow); font-family: 'Cinzel', serif; }
.modal-close { color: var(--text-dim); cursor: pointer; font-size: 20px; padding: 4px 8px; }
.modal-body { flex: 1; overflow-y: auto; padding: 20px 24px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.form-group { margin-bottom: 24px; }
.form-label { display: block; font-size: 13px; color: var(--orange-glow); margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }
.form-input, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 16px; font-size: 14px; color: var(--text); font-family: 'Noto Serif SC', serif; outline: none; transition: border-color .15s; }
.form-input:focus, .form-textarea:focus { border-color: var(--orange); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }
.form-textarea { min-height: 80px; resize: vertical; }
.picker-row { display: flex; gap: 10px; }
.picker-row .form-input { flex: 1; color-scheme: dark; }

.rarity-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.rarity-opt { padding: 8px 18px; border-radius: 24px; font-size: 13px; border: 1px solid var(--border); color: var(--text-dim); background: var(--bg3); cursor: pointer; transition: all .15s; font-family: 'Noto Serif SC', serif; }
.rarity-opt.sel-common { background: #2a2a2a; border-color: #c0c0c0; color: #e0e0e0; }
.rarity-opt.sel-rare   { background: #101a3a; border-color: #70a8f0; color: #a0c8f8; }
.rarity-opt.sel-epic   { background: #1e1040; border-color: #b080f0; color: #d0a8f8; }
.rarity-opt.sel-legend { background: #3a2808; border-color: #f0c060; color: #f8e090; }

.modal-footer { display: flex; gap: 12px; padding: 16px 24px; border-top: 1px solid var(--border); }
.btn-cancel { flex: 1; padding: 13px; text-align: center; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text-dim); cursor: pointer; font-family: 'Noto Serif SC', serif; font-size: 14px; }
.btn-submit { flex: 2; padding: 13px; text-align: center; border-radius: 10px; background: linear-gradient(135deg, var(--orange-dim), var(--orange)); color: #fff; font-weight: 700; cursor: pointer; font-family: 'Noto Serif SC', serif; font-size: 14px; border: none; box-shadow: 0 4px 16px rgba(180,80,20,.4); }

.detail-modal .modal-box { border-radius: 24px; margin: 20px; max-height: 80vh; align-self: center; }
.detail-body { padding: 24px; }
.detail-dish-name { font-size: 24px; font-weight: 700; color: #f0c090; margin-bottom: 6px; }
.detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--text-dim); }
.detail-val { color: var(--text); font-weight: 500; }
.detail-note-box { margin-top: 14px; padding: 14px; background: rgba(255,255,255,.03); border-radius: 10px; font-size: 13px; line-height: 1.7; color: var(--text-dim); border-left: 2px solid var(--border2); }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2a1808; color: var(--orange-glow); border: 1px solid var(--border2); border-radius: 24px; padding: 10px 24px; font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9999; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #3a1010; color: #f08080; border-color: #6a2828; }
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(16,8,0,.7); z-index: 500; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: var(--orange-glow); font-size: 15px; }
.loading-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="header-icon">🍲</span>
    <h1>烹饪互助广场</h1>
    <p class="header-sub">分享你的美食 · 共享烹饪时光</p>
  </header>

  <div class="action-bar">
    <div class="search-row">
      <div class="search-box">
        <span>🔍</span>
        <input id="searchInput" type="text" placeholder="搜索菜品名称、玩家ID…" oninput="onSearch()">
        <span class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none">✕</span>
      </div>
      <button class="publish-btn" onclick="openPublish()">＋ 发布</button>
    </div>
    <div class="filter-scroll" id="filterScroll"></div>
  </div>

  <div class="identity-bar">
    <span>🍳 当前身份：</span>
    <span class="id-val" id="myIdDisplay">—</span>
    <span class="change-id" onclick="changeId()">更改</span>
  </div>

  <div class="stats-bar">共 <span id="statTotal">0</span> 条发布 · 显示 <span id="statShown">0</span> 条</div>
  <div class="post-list" id="postList"><div class="empty-state"><span class="ei">🥘</span><p>正在加载…</p></div></div>
</div>

<!-- 发布弹窗 -->
<div class="modal-mask" id="publishModal" onclick="onMaskClick(event,'publishModal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">🍲 发布菜品信息</span>
      <span class="modal-close" onclick="closePublish()">✕</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">菜品名称 *</label>
        <input class="form-input" id="fDishName" placeholder="如：香草战斧牛排、墨汁海鲜意面…">
      </div>
      <div class="form-group">
        <label class="form-label">数量 *</label>
        <input class="form-input" id="fQty" type="number" min="1" placeholder="可取用数量">
      </div>
      <div class="form-group">
        <label class="form-label">你的游戏ID *</label>
        <input class="form-input" id="fPlayerId" placeholder="方便其他玩家联系你">
      </div>
      <div class="form-group">
        <label class="form-label">完成时间 *</label>
        <div class="picker-row">
          <input class="form-input" id="fMatureDate" type="date">
          <input class="form-input" id="fMatureTime" type="time">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">取走截止时间 *</label>
        <div class="picker-row">
          <input class="form-input" id="fExpireDate" type="date">
          <input class="form-input" id="fExpireTime" type="time">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">稀有度</label>
        <div class="rarity-picker" id="rarityPicker">
          <span class="rarity-opt sel-common" data-r="common" onclick="setRarity(this)">⚪ 普通</span>
          <span class="rarity-opt" data-r="rare"   onclick="setRarity(this)">🔵 稀有</span>
          <span class="rarity-opt" data-r="epic"   onclick="setRarity(this)">🟣 史诗</span>
          <span class="rarity-opt" data-r="legend" onclick="setRarity(this)">🟡 传说</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">备注（可选）</label>
        <textarea class="form-textarea" id="fNote" placeholder="如交换需求、口味说明等"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <div class="btn-cancel" onclick="closePublish()">取消</div>
      <div class="btn-submit" onclick="submitPost()">发布</div>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-mask detail-modal" id="detailModal" onclick="onMaskClick(event,'detailModal')">
  <div class="modal-box" style="border-radius:24px;margin:20px;align-self:center;max-height:80vh;">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">菜品详情</span>
      <span class="modal-close" onclick="closeDetail()">✕</span>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading"><div class="spinner"></div><span>烹饪中…</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://ygslzwiznvcfujonvblq.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlnc2x6d2l6bnZjZnVqb252YmxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDM4NjksImV4cCI6MjA5NTYxOTg2OX0.J9P1NyK5tiSzPZgDeLpwfS2eRaFrP5Gb4fgpmA258vA'
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const OWNER_KEY = 'cook_share_owner_id'
const FILTERS = [
  { id:'all',      label:'全部' },
  { id:'ready',    label:'✅ 已完成' },
  { id:'cooking',  label:'🍳 烹饪中' },
  { id:'expiring', label:'⏰ 快取走' },
  { id:'common',   label:'⚪ 普通' },
  { id:'rare',     label:'🔵 稀有' },
  { id:'epic',     label:'🟣 史诗' },
  { id:'legend',   label:'🟡 传说' },
]
const RARITY_LABELS = { common:'普通', rare:'稀有', epic:'史诗', legend:'传说' }
const DISH_ICONS = {
  default:'🍲',
  '海鱼黄金焗饭':'🍛','奶油蘑菇炖饭':'🍄','果香烤乳猪':'🐷','幽兰秘制肉卷':'🥩',
  '海盐烤虾':'🦐','红酒鹿肉炖汤':'🍷','甜奶油蛋派':'🥧','香草战斧牛排':'🥩',
  '香草风味烤扇贝':'🐚','浓香烤全鸡':'🍗','奶油蟹粉面':'🦀','墨汁海鲜意面':'🦑',
  '火焰蜜汁烤翅':'🍗','蜂蜜烤羊腿':'🍖','香煎怪肉排':'🥩','烈焰香煎鹅肝':'🍳',
  '酒心果子露':'🍹','浓醇提拉米苏':'🍮','香浓可可混莓果冻':'🍮','迷迭香风味沙拉':'🥗',
  '招财进宝汤饺':'🥟','年年有鱼':'🐟','神秘圣诞姜饼人':'🍪',
}

let allPosts=[], filteredPosts=[], activeFilter='all', searchKw='', selectedRarity='common', myOwnerId=''

async function init() {
  myOwnerId = localStorage.getItem(OWNER_KEY) || ''
  if (!myOwnerId) { myOwnerId = 'user_'+Math.random().toString(36).slice(2,10); localStorage.setItem(OWNER_KEY, myOwnerId) }
  document.getElementById('myIdDisplay').textContent = myOwnerId
  const today = new Date().toISOString().split('T')[0]
  document.getElementById('fMatureDate').value = today
  document.getElementById('fExpireDate').value = today
  buildFilters()
  await loadPosts()
  sb.channel('cook_posts_changes').on('postgres_changes',{event:'*',schema:'public',table:'cook_posts'},()=>loadPosts()).subscribe()
  setInterval(()=>recomputeStatus(), 60000)
}

function changeId() {
  const n = prompt('输入新的游戏ID:', myOwnerId)
  if (n&&n.trim()) { myOwnerId=n.trim(); localStorage.setItem(OWNER_KEY,myOwnerId); document.getElementById('myIdDisplay').textContent=myOwnerId; showToast('身份已更新') }
}

function buildFilters() {
  document.getElementById('filterScroll').innerHTML = FILTERS.map(f=>
    `<span class="filter-tag ${f.id==='all'?'active':''}" data-id="${f.id}" onclick="setFilter(this)">${f.label}</span>`
  ).join('')
}
function setFilter(el) {
  document.querySelectorAll('.filter-tag').forEach(t=>t.classList.remove('active'))
  el.classList.add('active'); activeFilter=el.dataset.id; applyFilter()
}

async function loadPosts() {
  showLoading(true)
  try {
    const now = Date.now()
    await sb.from('cook_posts').delete().eq('owner_id',myOwnerId).lt('expire_time',now)
    const {data,error} = await sb.from('cook_posts').select('*').gt('expire_time',now).order('expire_time',{ascending:true}).limit(200)
    if (error) throw error
    allPosts = (data||[]).map(p=>processPost(p,now))
    applyFilter()
  } catch(e) { showToast('加载失败，请刷新重试',true) }
  finally { showLoading(false) }
}

function processPost(p, now) {
  const matureTime=p.mature_time, expireTime=p.expire_time
  const dishName=p.dish_name, playerId=p.player_id, ownerId=p.owner_id
  const isMature=now>=matureTime, timeLeft=expireTime-now
  const totalSpan=expireTime-matureTime, elapsed=now-matureTime
  const progressPct=(isMature&&totalSpan>0)?Math.min(100,Math.round(elapsed/totalSpan*100)):0
  const expireSoon=timeLeft<2*3600*1000
  let status,statusLabel
  if (!isMature){status='cooking';statusLabel='🍳 烹饪中'}
  else if (expireSoon){status='expiring';statusLabel='⚠️ 快取走'}
  else{status='ready';statusLabel='✅ 已完成'}
  const countdownStr=!isMature?`还需 ${fmtDur(matureTime-now)} 完成`:`${fmtDur(timeLeft)} 后取走`
  return {
    id:p.id, dishName, quantity:p.quantity, playerId, ownerId,
    matureTime, expireTime, rarity:p.rarity||'common', note:p.note||'',
    status, statusLabel, countdownStr, progressPct, expireSoon,
    matureStr:fmtDt(matureTime), expireStr:fmtDt(expireTime),
    rarityLabel:RARITY_LABELS[p.rarity]||'普通',
    icon:DISH_ICONS[dishName]||DISH_ICONS.default,
    isOwn:ownerId===myOwnerId,
  }
}

function recomputeStatus() {
  const now=Date.now()
  allPosts=allPosts.filter(p=>p.expireTime>now).map(p=>processPost(p,now))
  applyFilter()
}

function onSearch() { searchKw=document.getElementById('searchInput').value; document.getElementById('clearBtn').style.display=searchKw?'block':'none'; applyFilter() }
function clearSearch() { document.getElementById('searchInput').value=''; searchKw=''; document.getElementById('clearBtn').style.display='none'; applyFilter() }

function applyFilter() {
  let list=[...allPosts]
  if (searchKw.trim()) { const kw=searchKw.trim().toLowerCase(); list=list.filter(p=>p.dishName.toLowerCase().includes(kw)||p.playerId.toLowerCase().includes(kw)||(p.note||'').toLowerCase().includes(kw)) }
  if (activeFilter!=='all') {
    if (['cooking','ready','expiring'].includes(activeFilter)) list=list.filter(p=>p.status===activeFilter)
    else list=list.filter(p=>p.rarity===activeFilter)
  }
  list.sort((a,b)=>{ if(a.status==='ready'&&b.status!=='ready')return -1; if(b.status==='ready'&&a.status!=='ready')return 1; return a.expireTime-b.expireTime })
  filteredPosts=list
  document.getElementById('statTotal').textContent=allPosts.length
  document.getElementById('statShown').textContent=list.length
  renderList()
}

function renderList() {
  const el=document.getElementById('postList')
  if (!filteredPosts.length){el.innerHTML=`<div class="empty-state"><span class="ei">🥘</span><p>暂无相关菜品帖子</p></div>`;return}
  el.innerHTML=filteredPosts.map((p,i)=>`
    <div class="post-card rarity-${p.rarity}" style="animation-delay:${i*40}ms" onclick="openDetail('${p.id}')">
      <span class="rarity-badge ${p.rarity}">${p.rarityLabel}</span>
      <div class="card-header">
        <div class="dish-avatar">${p.icon}</div>
        <div class="card-meta">
          <span class="dish-name">${esc(p.dishName)}</span>
          <span class="player-id">玩家：${esc(p.playerId)}</span>
        </div>
        <span class="qty-badge">×${p.quantity}</span>
      </div>
      ${p.note?`<div class="card-note">💬 ${esc(p.note)}</div>`:''}
      <div class="card-times">
        <div class="time-row"><span class="time-label">🍳 完成时间</span><span class="time-val">${p.matureStr}</span></div>
        <div class="time-row"><span class="time-label">⏳ 取走截止</span><span class="time-val ${p.expireSoon?'soon':''}">${p.expireStr}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p.progressPct}%"></div></div>
      <div class="card-footer">
        <span class="status-badge ${p.status}">${p.statusLabel}</span>
        <span class="countdown">${p.countdownStr}</span>
      </div>
      ${p.isOwn?`<span class="delete-btn" onclick="deletePost(event,'${p.id}')">删除</span>`:''}
    </div>
  `).join('')
}

function openPublish() {
  if (myOwnerId&&!myOwnerId.startsWith('user_')) document.getElementById('fPlayerId').value=myOwnerId
  else document.getElementById('fPlayerId').value=''
  document.getElementById('publishModal').classList.add('open')
}
function closePublish() { document.getElementById('publishModal').classList.remove('open') }

function setRarity(el) {
  document.querySelectorAll('#rarityPicker .rarity-opt').forEach(o=>o.className='rarity-opt')
  el.className=`rarity-opt sel-${el.dataset.r}`; selectedRarity=el.dataset.r
}

async function submitPost() {
  const dishName=document.getElementById('fDishName').value.trim()
  const qty=document.getElementById('fQty').value.trim()
  const playerId=document.getElementById('fPlayerId').value.trim()
  const md=document.getElementById('fMatureDate').value, mt=document.getElementById('fMatureTime').value
  const ed=document.getElementById('fExpireDate').value, et=document.getElementById('fExpireTime').value
  const note=document.getElementById('fNote').value.trim()
  if (!dishName) return showToast('请填写菜品名称',true)
  if (!qty||isNaN(+qty)||+qty<1) return showToast('请填写正确的数量',true)
  if (!playerId) return showToast('请填写游戏ID',true)
  if (!md||!mt) return showToast('请填写完成时间',true)
  if (!ed||!et) return showToast('请填写取走截止时间',true)
  const matureTs=new Date(`${md}T${mt}`).getTime(), expireTs=new Date(`${ed}T${et}`).getTime()
  if (isNaN(matureTs)) return showToast('完成时间格式有误',true)
  if (isNaN(expireTs)) return showToast('取走截止时间格式有误',true)
  if (expireTs<=matureTs) return showToast('取走截止须晚于完成时间',true)
  if (expireTs<=Date.now()) return showToast('取走截止时间已过期',true)
  myOwnerId=playerId; localStorage.setItem(OWNER_KEY,myOwnerId); document.getElementById('myIdDisplay').textContent=myOwnerId
  showLoading(true)
  try {
    const {error}=await sb.from('cook_posts').insert({
      dish_name:dishName, quantity:+qty, player_id:playerId,
      mature_time:matureTs, expire_time:expireTs,
      rarity:selectedRarity, note, owner_id:myOwnerId, created_at:Date.now()
    })
    if (error) throw error
    closePublish(); showToast('发布成功！🍲')
    ;['fDishName','fQty','fNote'].forEach(id=>document.getElementById(id).value='')
  } catch(e) { showToast('发布失败：'+(e.message||'请重试'),true) }
  finally { showLoading(false) }
}

async function deletePost(e,id) {
  e.stopPropagation()
  if (!confirm('确认删除？')) return
  showLoading(true)
  try { const {error}=await sb.from('cook_posts').delete().eq('id',id); if(error)throw error; showToast('已删除') }
  catch(e) { showToast('删除失败',true) }
  finally { showLoading(false) }
}

function openDetail(id) {
  const p=filteredPosts.find(x=>x.id===id); if (!p) return
  document.getElementById('detailTitle').textContent=`🍲 ${p.dishName}`
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-body">
      <div class="detail-dish-name">${esc(p.dishName)} <span style="font-size:14px;color:var(--text-dim)">×${p.quantity}</span></div>
      <div style="margin-bottom:16px"><span class="rarity-badge ${p.rarity}" style="position:static">${p.rarityLabel}</span></div>
      <div class="detail-row"><span class="detail-key">玩家ID</span><span class="detail-val">${esc(p.playerId)}</span></div>
      <div class="detail-row"><span class="detail-key">状态</span><span class="detail-val">${p.statusLabel}</span></div>
      <div class="detail-row"><span class="detail-key">完成时间</span><span class="detail-val">${p.matureStr}</span></div>
      <div class="detail-row"><span class="detail-key">取走截止</span><span class="detail-val ${p.expireSoon?'soon':''}">${p.expireStr}</span></div>
      <div class="detail-row"><span class="detail-key">倒计时</span><span class="detail-val">${p.countdownStr}</span></div>
      ${p.note?`<div class="detail-note-box">💬 ${esc(p.note)}</div>`:''}
    </div>`
  document.getElementById('detailModal').classList.add('open')
}
function closeDetail() { document.getElementById('detailModal').classList.remove('open') }
function onMaskClick(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open') }

function fmtDt(ts) { const d=new Date(ts),pad=n=>String(n).padStart(2,'0'); return `${d.getMonth()+1}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}` }
function fmtDur(ms) { if(ms<=0)return'0分钟'; const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); return h>0?`${h}小时${m>0?m+'分钟':''}`:`${m}分钟` }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function showLoading(on) { document.getElementById('loading').classList.toggle('show',on) }
let toastTimer
function showToast(msg,isErr=false) { const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'+(isErr?' error':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2500) }

init()
</script>
</body>
</html>
